<h1>{{ portalName }}</h1>

<p>
  Manage your courses, track your academic progress and view your profile.
</p>

<!--
[property] is one-way binding (Component → DOM)
[(ngModel)] is two-way binding (Component ↔ DOM)
-->

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br><br>

<label>Search Course:</label>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<div class="stats">

  <div class="card">
    <h3>Courses Available</h3>
    <p>{{ availableCourses }}</p>
  </div>

  <div class="card">
    <h3>Enrolled</h3>
    <p>{{ enrolledCourses }}</p>
  </div>

  <div class="card">
    <h3>GPA</h3>
    <p>{{ gpa }}</p>
  </div>

</div>
