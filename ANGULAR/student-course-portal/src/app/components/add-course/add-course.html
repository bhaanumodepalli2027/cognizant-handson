<div style="border: 1px dashed #3498db; background-color: #f4f9fc; padding: 15px; margin-bottom: 20px; border-radius: 6px;">
  <h3>Add New Course (Reactive Form)</h3>

  <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
    
    <!-- Course Name -->
    <div style="margin-bottom: 10px;">
      <label style="display: block;">Course Name:</label>
      <input type="text" formControlName="name" style="width: 100%; padding: 6px;" />
      <span *ngIf="f.name.touched && f.name.invalid" style="color: red; font-size: 12px;">
        Name is required (at least 3 characters).
      </span>
    </div>

    <!-- Course Code -->
    <div style="margin-bottom: 10px;">
      <label style="display: block;">Course Code (e.g. ANG101):</label>
      <input type="text" formControlName="code" style="width: 100%; padding: 6px;" />
      <span *ngIf="f.code.touched && f.code.invalid" style="color: red; font-size: 12px;">
        Must be 3 letters followed by 3 numbers (e.g., ANG101).
      </span>
    </div>

    <!-- Credits & Price -->
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <div style="flex: 1;">
        <label style="display: block;">Credits (1-6):</label>
        <input type="number" formControlName="credits" style="width: 100%; padding: 6px;" />
      </div>
      <div style="flex: 1;">
        <label style="display: block;">Price ($):</label>
        <input type="number" formControlName="price" style="width: 100%; padding: 6px;" />
      </div>
    </div>

    <!-- Submit Button (Disabled until form is valid) -->
    <button type="submit" [disabled]="courseForm.invalid" style="padding: 8px 16px; cursor: pointer;">
      Add Course
    </button>
  </form>
</div>
