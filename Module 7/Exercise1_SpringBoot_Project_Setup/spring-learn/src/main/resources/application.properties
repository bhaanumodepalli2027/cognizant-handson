# Port on which the embedded Tomcat runs
server.port=8083

# Root Spring framework log level
logging.level.org.springframework=info

# Application-level log level for detailed output during development
logging.level.com.cognizant.springlearn=debug

# Custom console pattern: date | time | thread | level | logger | method | message
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n
